server.port=${SERVER_PORT:8085}
server.address=${SERVER_ADDRESS:0.0.0.0}
 
# PostgreSQL Connection settings (Optimized for AWS RDS)
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:scaloz_super_admin}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# HikariCP Connection Pooling Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
 
# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# Domain Configuration
scaloz.app.domainName=${DOMAIN_NAME:localhost}
scaloz.app.workspacePrefix=${WORKSPACE_PREFIX:workspace}
 
# JWT Config properties
scaloz.app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250655368566D5970}
scaloz.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}
 
# SSO — IAM Issuer identifier (must match in HRMS backend JWT_ISSUER env var)
scaloz.app.jwtIssuer=${JWT_ISSUER:scaloz-iam}
 
# HRMS integration settings for direct onboarding synchronization
hrms.api.url=${HRMS_API_URL:http://localhost:8082/api/external/employees}
 
# Scaloz → HRMS reverse sync endpoint (this service's own sync-from-hrms URL)
scaloz.api.url=${SCALOZ_SYNC_URL:http://localhost:8082/api/tenant-users/sync-from-hrms}
 
# Email (SMTP) configuration — replace with actual SMTP credentials
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:testadmin@xevyte.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:moyfxbwpghirmfpg}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true