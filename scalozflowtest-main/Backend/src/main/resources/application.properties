spring.application.name=backend

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform is intentionally omitted — Hibernate 6 auto-detects PostgreSQL dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security Configuration
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=never

# Enterprise Mail Service Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ScalozFlowApplication Properties
flowtrack.frontend.url=${FRONTEND_URL:https://scalozflowtest.scaloz.com}
scaloz.workspace.jwtSecret=${SCALOZ_WORKSPACE_JWT_SECRET}
scaloz.workspace.allowedApps=${ALLOWED_APPS}
encryption.key=${ENCRYPTION_KEY}
flowtrack.integration.api-key=${INTEGRATION_API_KEY}

# Admin Initialization Properties
flowtrack.admin.email=${ADMIN_EMAIL:}
flowtrack.admin.password=${ADMIN_PASSWORD:}
flowtrack.admin.empId=${ADMIN_EMPID:}



